# Webclip — docker compose up -d
# データは ./data/webclip.db に永続化（.gitignore 済み）

services:
  webclip:
    build:
      context: .
      dockerfile: Dockerfile
    image: webclip:latest
    container_name: webclip
    ports:
      - "${WEBCLIP_PORT:-3847}:3847"
    environment:
      PORT: "3847"
      DATABASE_URL: sqlite:////app/data/webclip.db
      # 必要ならコメントを外す
      # WEBCLIP_API_TOKEN: "your-secret-token"
      # WEBCLIP_BEARER_AUTH_ENABLED: "true"
      # WEBCLIP_TRASH_RETENTION_DAYS: "30"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3847/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
